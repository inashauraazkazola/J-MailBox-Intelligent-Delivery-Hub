# mosquitto_ssl.conf
# MQTT Broker dengan SSL/TLS untuk J-MailBox

# Port default MQTT tanpa SSL
# listener 1883

# Port MQTT dengan SSL/TLS
listener 8883
protocol mqtt

# Port WebSocket dengan SSL
listener 8083
protocol websockets

# Autentikasi
allow_anonymous false
password_file /etc/mosquitto/passwd

# SSL/TLS Configuration
cafile /etc/mosquitto/certs/ca.crt
certfile /etc/mosquitto/certs/server.crt
keyfile /etc/mosquitto/certs/server.key
require_certificate false
use_identity_as_username true
tls_version tlsv1.2

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_dest stdout
log_type all
connection_messages true
log_timestamp true

# Security
persistence true
persistence_location /var/lib/mosquitto/
persistent_client_expiration 14d

# Performance
max_connections -1
max_queued_messages 1000
message_size_limit 0
queue_qos0_messages true
retain_available true
max_inflight_messages 20
max_queued_messages 1000

# Bridge configuration untuk komunikasi antar broker (jika diperlukan)
# connection bridge-to-cloud
# address broker.emqx.io:8883
# topic # both 0

# ACL untuk kontrol akses
acl_file /etc/mosquitto/acl